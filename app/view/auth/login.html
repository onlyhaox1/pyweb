{% extends "layouts/base.html" %}

{% block title %}登录 - ThinkPHP Python Web{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto;">
    <div class="card">
        <div class="card-header" style="text-align: center;">
            <h2><i class="fas fa-sign-in-alt"></i> 用户登录</h2>
        </div>
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 8px; font-weight: normal;">
                    <input type="checkbox" name="remember" value="1">
                    记住我
                </label>
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </div>
        </form>
        
        <div style="text-align: center; margin-top: 20px;">
            <p>还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a></p>
        </div>
        
        <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 4px;">
            <h4 style="margin-bottom: 10px; font-size: 0.9rem;">默认测试账号：</h4>
            <p style="font-size: 0.85rem; margin: 5px 0;"><strong>admin</strong> / admin123 (超级管理员)</p>
            <p style="font-size: 0.85rem; margin: 5px 0;"><strong>manager</strong> / admin123 (普通管理员)</p>
            <p style="font-size: 0.85rem; margin: 5px 0;"><strong>user</strong> / admin123 (普通用户)</p>
        </div>
    </div>
</div>
{% endblock %}
