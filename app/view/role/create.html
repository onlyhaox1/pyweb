{% extends "layouts/base.html" %}

{% block title %}创建角色 - ThinkPHP Python Web{% endblock %}

{% block page_title %}创建角色{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px;">
    <div class="card-header">
        <h2><i class="fas fa-user-plus"></i> 新增角色</h2>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label for="name">角色标识 *</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="例如：editor, viewer">
            <small style="color: #666;">英文字母、数字和下划线组成</small>
        </div>
        
        <div class="form-group">
            <label for="description">角色描述</label>
            <input type="text" id="description" name="description" class="form-control" placeholder="描述该角色的职责">
        </div>
        
        <div class="form-group">
            <label>菜单权限 *</label>
            <div class="checkbox-group">
                {% for menu in all_menus %}
                <div class="checkbox-item">
                    <input type="checkbox" name="menus[]" value="{{ menu.id }}" id="menu-{{ menu.id }}">
                    <label for="menu-{{ menu.id }}" style="font-weight: normal; margin: 0;">
                        <i class="fas {{ menu.icon }}"></i> {{ menu.title }}
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>
        
        <div class="form-group" style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> 保存
            </button>
            <a href="{{ url_for('role.index') }}" class="btn" style="background: #6c757d; color: white;">
                <i class="fas fa-times"></i> 取消
            </a>
        </div>
    </form>
</div>
{% endblock %}
