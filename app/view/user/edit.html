{% extends "layouts/base.html" %}

{% block title %}编辑用户 - ThinkPHP Python Web{% endblock %}

{% block page_title %}编辑用户{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px;">
    <div class="card-header">
        <h2><i class="fas fa-user-edit"></i> 编辑用户：{{ user.username }}</h2>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" value="{{ user.username }}" class="form-control" disabled>
            <small style="color: #666;">用户名不可修改</small>
        </div>
        
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" value="{{ user.email or '' }}" class="form-control">
        </div>
        
        <div class="form-group">
            <label for="password">新密码</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="留空则不修改密码">
        </div>
        
        <div class="form-group">
            <label for="role_id">角色 *</label>
            <select id="role_id" name="role_id" class="form-control" required>
                {% for role in roles %}
                <option value="{{ role.id }}" {% if role.id == user.role_id %}selected{% endif %}>
                    {{ role.name }} - {{ role.description }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" name="is_active" value="1" {% if user.is_active %}checked{% endif %}>
                账户启用
            </label>
        </div>
        
        <div class="form-group" style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> 保存
            </button>
            <a href="{{ url_for('user.index') }}" class="btn" style="background: #6c757d; color: white;">
                <i class="fas fa-times"></i> 取消
            </a>
        </div>
    </form>
</div>
{% endblock %}
