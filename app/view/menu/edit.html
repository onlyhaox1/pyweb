{% extends "layouts/base.html" %}

{% block title %}编辑菜单 - ThinkPHP Python Web{% endblock %}

{% block page_title %}编辑菜单{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px;">
    <div class="card-header">
        <h2><i class="fas fa-bars"></i> 编辑菜单：{{ menu.title }}</h2>
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label for="name">菜单标识</label>
            <input type="text" id="name" value="{{ menu.name }}" class="form-control" disabled>
            <small style="color: #666;">菜单标识不可修改</small>
        </div>
        
        <div class="form-group">
            <label for="title">菜单名称 *</label>
            <input type="text" id="title" name="title" value="{{ menu.title }}" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="url">URL 地址</label>
            <input type="text" id="url" name="url" value="{{ menu.url or '' }}" class="form-control">
        </div>
        
        <div class="form-group">
            <label for="parent_id">父菜单</label>
            <select id="parent_id" name="parent_id" class="form-control">
                <option value="">无（顶级菜单）</option>
                {% for m in parent_menus %}
                <option value="{{ m.id }}" {% if m.id == menu.parent_id %}selected{% endif %}>{{ m.title }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="icon">图标</label>
            <input type="text" id="icon" name="icon" value="{{ menu.icon or 'fa-circle' }}" class="form-control">
        </div>
        
        <div class="form-group">
            <label for="sort_order">排序</label>
            <input type="number" id="sort_order" name="sort_order" value="{{ menu.sort_order }}" class="form-control">
        </div>
        
        <div class="form-group">
            <label style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" name="is_visible" value="1" {% if menu.is_visible %}checked{% endif %}>
                菜单显示
            </label>
        </div>
        
        <div class="form-group" style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> 保存
            </button>
            <a href="{{ url_for('menu.index') }}" class="btn" style="background: #6c757d; color: white;">
                <i class="fas fa-times"></i> 取消
            </a>
        </div>
    </form>
</div>
{% endblock %}
